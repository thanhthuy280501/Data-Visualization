    var map = L.map('map').setView([37.8, -96], 4);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Step 4c: getColor function returns red for Trump and blue for Clinton [cite: 41]
    function getColor(d) {
        if (d === "Trump") {
            return '#FF0000'; // Red [cite: 42]
        } else if (d === "Clinton") {
            return '#0000FF'; // Blue [cite: 42]
        } else {
            return '#FFFFFF'; // White for others
        }
    }

    // Step 4b: Modify style() to see "winner" in the .js file 
    function style(feature) {
        return {
            weight: 2,
            opacity: 1,
            color: 'white',
            dashArray: '3',
            fillOpacity: 0.7,
            fillColor: getColor(feature.properties.winner) // Pulls winner property 
        };
    }
